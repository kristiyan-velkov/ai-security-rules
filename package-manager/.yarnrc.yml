# Yarn Berry (v2+) configuration — equivalent of the project .npmrc.
# Docs: https://yarnpkg.com/configuration/yarnrc
#
# For Yarn Classic (v1) use a `.yarnrc` file with key/value pairs instead.

# ── Security ─────────────────────────────────────────────────────────────────
# Prevent automatic execution of install scripts (lifecycle scripts)
enableScripts: false

# Always save exact package versions (no ^ or ~ prefix)
defaultSemverRangePrefix: ""

# Enforce strict Node.js engine validation
# Yarn defaults to a soft check; set to "strict" to fail on mismatch
nodeLinker: node-modules
packageExtensions: {}

# Enable strict SSL/TLS validation (default true, set explicitly)
enableStrictSsl: true

# Refuse to install if a peer dependency is missing or mismatched
# (Yarn already warns by default; this surfaces them prominently)
logFilters:
  - code: YN0002 # missing peer dependency
    level: error
  - code: YN0060 # incompatible peer dependency
    level: error

# ── Performance / reproducibility ────────────────────────────────────────────
# Prefer cached packages when possible (offline mirror)
enableGlobalCache: true
enableMirror: true

# Use the official npm registry or your private npm registry
npmRegistryServer: "https://registry.npmjs.org/"

# Always require an up-to-date lockfile in CI
enableImmutableInstalls: true

# Disable telemetry / update-notifier-style network calls
enableTelemetry: false

# ── Yarn-specific behavior ───────────────────────────────────────────────────
# Highest compression for a smaller .yarn/cache footprint in the repo (with zero-installs)
compressionLevel: mixed

# Pin Yarn version via the `packageManager` field in package.json
# (run `corepack enable` so the right version is used automatically)

# ── Dependency confusion protection ──────────────────────────────────────────
# A global npmRegistryServer override does NOT protect scoped internal packages.
# Scope all internal packages and point each scope at your private registry:
#
# npmScopes:
#   your-org:
#     npmRegistryServer: "https://npm.your-registry.internal/"
#     npmAlwaysAuth: true
#     npmAuthToken: "${NPM_AUTH_TOKEN}"
#
# This ensures Yarn never resolves @your-org/* from the public registry,
# preventing an attacker from hijacking them with a higher-versioned public package.
